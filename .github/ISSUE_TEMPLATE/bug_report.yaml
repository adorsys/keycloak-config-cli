name: 🐞 Bug
description: Something is not working as indended.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        For usage questions, please use Discussions (Q&A) instead.
  - type: textarea
    attributes:
      label: Current Behavior
      description: A concise description of what you're experiencing.
      placeholder: |
        When I do <X>, <Y> happens and I see the error message attached below:
        ```...```
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: A concise description of what you expected to happen.
      placeholder: When I do <X>, <Z> should happen instead.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. In this environment...
        2. With this config...
        3. Run '...'
        4. See error...
      render: markdown
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Deployment Method
      description: How are you running keycloak-config-cli?
      options:
        - JAR
        - Docker
        - Helm / Kubernetes
        - Other
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: |
        examples:
        - **Keycloak Version**: 24.0.1
        - **keycloak-config-cli Version**: 5.11.1
        - **Java Version**: 21
      value: |
        - Keycloak Version: [e.g. 24.0.1]
        - keycloak-config-cli Version: [e.g. 5.11.1]
        - Java Version: [e.g. 21]
    validations:
      required: true
  - type: textarea
    attributes:
      label: Relevant configuration (sanitized)
      description: |
        Paste the minimal config needed to reproduce the issue.
        Remove secrets/tokens/passwords.
      render: yaml
    validations:
      required: false
  - type: textarea
    attributes:
      label: Logs / error output
      description: Paste relevant logs or stack traces.
      render: shell
    validations:
      required: false
  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? References? Anything that will give us more context about the issue you are encountering!

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
